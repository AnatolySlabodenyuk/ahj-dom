<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AHJ DOM</title>
</head>
<body>

  <h1>Задание 1: Перемещение элементов</h1>
  <div class="game-field"></div>

  <h1>Задание 2: Загрузка и сортировка (data-атрибуты)</h1>
  <div class="task2">
    <p class="sort-info task2-sort-info"></p>
    <table class="movies-table" id="table-data-attr">
      <thead>
        <tr>
          <th data-field="id">ID</th>
          <th data-field="title">Название</th>
          <th data-field="imdb">IMDB</th>
          <th data-field="year">Год</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <h1>Задание 3: Загрузка и сортировка (in-memory)</h1>
  <div class="task3">
    <p class="sort-info task3-sort-info"></p>
    <table class="movies-table" id="table-memory">
      <thead>
        <tr>
          <th data-field="id">ID</th>
          <th data-field="title">Название</th>
          <th data-field="imdb">IMDB</th>
          <th data-field="year">Год</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

</body>
</html>
